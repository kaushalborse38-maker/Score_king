<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cricket Pro - V11 Premium Elite</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/Gemini_Generated_Image_6n10tz6n10tz6n10.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow: hidden; 
            background-color: #020617;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .app-container {
            height: 100vh;
            height: 100dvh;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            display: flex;
            flex-direction: column;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .scale-in-center { animation: scale-in-center 0.4s cubic-bezier(0.175, 0.885, 0.320, 1.275) both; }
        @keyframes scale-in-center { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        @keyframes ball-pop {
            0% { transform: scale(0.5) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-ball-pop { animation: ball-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        .animate-spin-slow { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        button:active { transform: scale(0.94); }

        /* Boundary Animations */
        @keyframes boundary-flash {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0; }
        }
        .boundary-anim {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .boundary-text {
            font-size: 5rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            animation: boundary-flash 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            text-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            top: -10px;
            z-index: 100;
            animation: confetti-fall 3s linear infinite;
        }
    </style>
    <script>
        const apiKey = "";
        
        // MP3 Audio Assets (Random Selection Arrays)
        const SOUNDS = {
            six: [
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/ElevenLabs_2026-04-01T14_09_43_Shaurya%E2%80%93%20Radio%20Sports%20Commentary_pvc_sp114_s69_sb41_se100_b_m2.mp3",
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/6-2.mp3",
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/6%203.mp3"
            ],
            four: [
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/4%202.mp3",
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/4%203.mp3",
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/4.mp3"
            ],
            wicket: [
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/out%20-2.mp3",
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/out.mp3",
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/w%202.mp3",
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/w3.mp3"
            ],
            single: [
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/1.ogg"
            ],
            dot: [
                "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/FAHHH%20(Meme%20Sound%20Effect)%20-%20Fun%20Zone%20Guy.mp3"
            ]
        };

        const PLAYER_PHOTOS = {
            Kaushal: "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/Gemini_Generated_Image_r34m8ur34m8ur34m.png",
            Sumit: "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/Gemini_Generated_Image_vv670gvv670gvv67.png"
        };

        const STORAGE_KEY = 'cricket_pro_v11_local_data_elite';
        const INITIAL_STATE = {
            view: 'home', 
            activeStatsPlayer: 'Sumit',
            showSetupModal: false,
            showSecurityModal: false,
            securityError: false,
            voiceEnabled: true,
            selectedHistoryMatch: null, 
            settings: { overs: 20, wickets: 2 },
            match: {
                innings: 1,
                battingTeam: 'Kaushal',
                bowlingTeam: 'Sumit',
                score: 0,
                wickets: 0,
                balls: 0,
                target: null,
                ballLog: [],
                status: 'idle', 
                winner: null,
                tossWinner: 'Kaushal',
                tossChoice: 'Bat',
                liveBatter: { runs: 0, balls: 0, fours: 0, sixes: 0 },
                liveBowler: { runs: 0, balls: 0, wickets: 0 },
                innings1Data: null 
            },
            playerStats: {
                Kaushal: { runs: 0, matches: 0, wins: 0, wickets: 0, sixes: 0, fours: 0, dots: 0, singles: 0, fifties: 0, hundreds: 0, ballsFaced: 0, highestScore: 0 },
                Sumit: { runs: 0, matches: 0, wins: 0, wickets: 0, sixes: 0, fours: 0, dots: 0, singles: 0, fifties: 0, hundreds: 0, ballsFaced: 0, highestScore: 0 }
            },
            matchHistory: []
        };

        let state = JSON.parse(JSON.stringify(INITIAL_STATE));

        function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

        function loadFromLocal() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    state = { ...INITIAL_STATE, ...parsed };
                } catch (e) {
                    state = JSON.parse(JSON.stringify(INITIAL_STATE));
                }
            }
            render();
        }

        // Logic for playing specific MP3 sounds with random selection
        function playAppSound(key, fallbackText) {
            if (!state.voiceEnabled) return;
            
            let soundList = SOUNDS[key];
            let soundSrc = "";

            if (Array.isArray(soundList) && soundList.length > 0) {
                soundSrc = soundList[Math.floor(Math.random() * soundList.length)];
            }

            if (soundSrc && soundSrc !== "") {
                const audio = new Audio(soundSrc);
                audio.play().catch(e => {
                    console.log("Audio play blocked or link broken, using TTS fallback");
                    if (fallbackText) speakFallback(fallbackText);
                });
            } else if (fallbackText) {
                speakFallback(fallbackText);
            }
        }

        // Fallback to Gemini TTS if MP3 link isn't provided
        async function speakFallback(text) {
            if (!state.voiceEnabled) return;
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                },
                model: "gemini-2.5-flash-preview-tts"
            };
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const result = await response.json();
                const audioData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (audioData) playAudioBuffer(audioData);
            } catch (err) { console.error("TTS Error", err); }
        }

        function playAudioBuffer(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const blob = new Blob([bytes], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            new Audio(url).play();
        }

        window.initApp = function() { loadFromLocal(); };

        window.triggerBoundaryAnimation = function(val) {
            const container = document.createElement('div');
            container.className = 'boundary-anim';
            const text = document.createElement('div');
            text.className = `boundary-text ${val === 6 ? 'text-amber-500' : 'text-blue-500'}`;
            text.innerText = val === 6 ? 'MAXIMUM!' : 'BOUNDARY!';
            container.appendChild(text);
            document.body.appendChild(container);
            setTimeout(() => container.remove(), 1200);
        };

        window.addBall = function(run, type = 'normal') {
            if (state.match.status !== 'live') return;
            const m = state.match;
            
            if (type === 'wicket') {
                playAppSound('wicket', "Oh no its out");
                m.wickets += 1;
                m.balls += 1;
                m.liveBatter.balls += 1;
                m.liveBowler.wickets += 1;
                m.liveBowler.balls += 1;
            } else if (type === 'wide' || type === 'noball') {
                m.score += (run + 1);
                m.liveBowler.runs += (run + 1);
                speakFallback(type === 'wide' ? "Wide ball" : "No ball");
                if (type === 'noball') {
                    m.liveBatter.runs += run;
                    m.liveBatter.balls += 1;
                }
            } else {
                m.score += run;
                m.balls += 1;
                m.liveBatter.runs += run;
                m.liveBatter.balls += 1;
                m.liveBowler.runs += run;
                m.liveBowler.balls += 1;
                
                if (run === 1) playAppSound('single', "single run");
                else if (run === 4) {
                    m.liveBatter.fours += 1;
                    triggerBoundaryAnimation(4);
                    playAppSound('four', "its a boundary");
                } else if (run === 6) {
                    m.liveBatter.sixes += 1;
                    triggerBoundaryAnimation(6);
                    playAppSound('six', "It is a maximum");
                } else if (run === 0) {
                    playAppSound('dot', "Dot ball");
                }
            }

            m.ballLog.push({ run, type, id: Date.now() });
            checkMatchProgress();
            render();
            saveToLocal();
        };

        window.undoLast = function() {
            if (state.match.ballLog.length === 0) return;
            const last = state.match.ballLog.pop();
            const m = state.match;
            if (last.type === 'wide' || last.type === 'noball') {
                m.score -= (last.run + 1);
                m.liveBowler.runs -= (last.run + 1);
                if (last.type === 'noball') { m.liveBatter.runs -= last.run; m.liveBatter.balls -= 1; }
            } else if (last.type === 'wicket') {
                m.wickets -= 1; m.balls -= 1; m.liveBatter.balls -= 1; m.liveBowler.wickets -= 1; m.liveBowler.balls -= 1;
            } else {
                m.score -= last.run; m.balls -= 1; m.liveBatter.runs -= last.run; m.liveBatter.balls -= 1;
                m.liveBowler.runs -= last.run; m.liveBowler.balls -= 1;
                if (last.run === 4) m.liveBatter.fours -= 1;
                if (last.run === 6) m.liveBatter.sixes -= 1;
            }
            render();
            saveToLocal();
        };

        function checkMatchProgress() {
            const m = state.match;
            const totalBalls = state.settings.overs * 6;
            const isAllOut = m.wickets >= state.settings.wickets;
            const isOversDone = m.balls >= totalBalls;

            if (m.innings === 1) {
                if (isAllOut || isOversDone) m.status = 'innings_break';
            } else {
                if (m.score >= m.target) {
                    m.status = 'finished'; m.winner = m.battingTeam; finishSequence();
                } else if (isAllOut || isOversDone) {
                    m.status = 'finished'; m.winner = m.bowlingTeam; finishSequence();
                }
            }
        }

        function finishSequence() { 
            recordInningsStats(); 
            updateMatchOutcome(); 
            saveToHistory(); 
        }

        function recordInningsStats() {
            const m = state.match;
            const batter = state.playerStats[m.battingTeam];
            const bowler = state.playerStats[m.bowlingTeam];
            batter.runs += m.score;
            batter.ballsFaced += m.balls;
            if (m.score > (batter.highestScore || 0)) batter.highestScore = m.score;
            if (m.score >= 100) batter.hundreds = (batter.hundreds || 0) + 1;
            else if (m.score >= 50) batter.fifties = (batter.fifties || 0) + 1;
            m.ballLog.forEach(b => {
                if (b.run === 4 && b.type === 'normal') batter.fours = (batter.fours || 0) + 1;
                if (b.run === 6 && b.type === 'normal') batter.sixes = (batter.sixes || 0) + 1;
            });
            bowler.wickets += m.wickets;
            saveToLocal();
        }

        function updateMatchOutcome() {
            const m = state.match;
            state.playerStats.Kaushal.matches++;
            state.playerStats.Sumit.matches++;
            if (m.winner) state.playerStats[m.winner].wins++;
            saveToLocal();
        }

        function saveToHistory() {
            const m = state.match;
            const record = {
                winner: m.winner,
                innings1: m.innings1Data,
                innings2: {
                    battingTeam: m.battingTeam, bowlingTeam: m.bowlingTeam,
                    score: m.score, wickets: m.wickets, balls: m.balls,
                    batter: { ...m.liveBatter }, bowler: { ...m.liveBowler }
                },
                timestamp: Date.now()
            };
            state.matchHistory.unshift(record);
            saveToLocal();
        }

        window.startInnings2 = function() {
            const m = state.match;
            m.innings1Data = {
                battingTeam: m.battingTeam, bowlingTeam: m.bowlingTeam,
                score: m.score, wickets: m.wickets, balls: m.balls,
                batter: { ...m.liveBatter }, bowler: { ...m.liveBowler }
            };
            recordInningsStats();
            state.match.target = state.match.score + 1;
            state.match.score = 0; state.match.wickets = 0; state.match.balls = 0;
            state.match.innings = 2; state.match.ballLog = []; state.match.status = 'live';
            state.match.liveBatter = { runs: 0, balls: 0, fours: 0, sixes: 0 };
            state.match.liveBowler = { runs: 0, balls: 0, wickets: 0 };
            const temp = state.match.battingTeam;
            state.match.battingTeam = state.match.bowlingTeam;
            state.match.bowlingTeam = temp;
            render();
            saveToLocal();
        };

        window.abandonMatch = function() {
            state.match = JSON.parse(JSON.stringify(INITIAL_STATE.match));
            state.view = 'home';
            render();
            saveToLocal();
        };

        window.verifyHistoryDelete = function() {
            const input = document.getElementById('security-pass').value;
            if (input === '123') {
                state.matchHistory = [];
                state.playerStats = JSON.parse(JSON.stringify(INITIAL_STATE.playerStats));
                state.showSecurityModal = false;
                render();
                saveToLocal();
            } else {
                state.securityError = true;
                render();
            }
        };

        window.finalizeMatchSetup = function() {
            const tossWinner = state.match.tossWinner;
            const tossChoice = state.match.tossChoice;
            let bat, bowl;
            if (tossWinner === 'Kaushal') {
                bat = tossChoice === 'Bat' ? 'Kaushal' : 'Sumit';
                bowl = tossChoice === 'Bat' ? 'Sumit' : 'Kaushal';
            } else {
                bat = tossChoice === 'Bat' ? 'Sumit' : 'Kaushal';
                bowl = tossChoice === 'Bat' ? 'Kaushal' : 'Sumit';
            }
            state.match = {
                ...INITIAL_STATE.match,
                status: 'live', battingTeam: bat, bowlingTeam: bowl,
                tossWinner, tossChoice, ballLog: [],
                liveBatter: { runs: 0, balls: 0, fours: 0, sixes: 0 },
                liveBowler: { runs: 0, balls: 0, wickets: 0 }
            };
            state.showSetupModal = false;
            state.view = 'play';
            render();
            setTimeout(saveToLocal, 50);
        };

        window.resetMatch = function() {
            state.match = JSON.parse(JSON.stringify(INITIAL_STATE.match));
            state.view = 'home';
            render();
            saveToLocal();
        };

        function formatOvers(balls) {
            const overs = Math.floor(balls / 6);
            const remainder = balls % 6;
            return `${overs}.${remainder}`;
        }

        window.setView = function(v) { state.view = v; render(); saveToLocal(); };
        window.toggleSetupModal = function(show) { state.showSetupModal = show; render(); };
        window.toggleSecurityModal = function(show) { state.showSecurityModal = show; state.securityError = false; render(); };
        window.setSetting = function(key, val) { state.settings[key] = parseInt(val); render(); };
        window.setActiveStatsPlayer = function(name) { state.activeStatsPlayer = name; render(); };
        window.setTossWinner = function(name) { state.match.tossWinner = name; render(); };
        window.setTossChoice = function(choice) { state.match.tossChoice = choice; render(); };
        window.resetMatchAndRemove = function() { state.match.status = 'idle'; window.resetMatch(); };
        window.openHistorySummary = function(idx) { state.selectedHistoryMatch = idx; render(); };
        window.closeHistorySummary = function() { state.selectedHistoryMatch = null; render(); };
        window.toggleVoice = function() { state.voiceEnabled = !state.voiceEnabled; render(); saveToLocal(); };

        function render() {
            const appEl = document.getElementById('app');
            if (!appEl) return;
            appEl.innerHTML = '';
            const container = document.createElement('div');
            container.className = 'max-w-md mx-auto app-container bg-[#020617] text-white flex flex-col relative overflow-hidden font-sans';

            const header = `
                <div class="px-5 py-4 flex justify-between items-center bg-[#0f172a]/70 backdrop-blur-2xl border-b border-white/5 sticky top-0 z-50">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-emerald-800 rounded-xl flex items-center justify-center rotate-3 border border-emerald-400/20">
                            <i data-lucide="zap" class="w-5 h-5 text-white fill-white"></i>
                        </div>
                        <div>
                            <h1 class="text-xs font-black tracking-[0.15em] leading-none uppercase italic text-emerald-50">Cricket Pro</h1>
                            <span class="text-[8px] text-emerald-400 font-black opacity-70 uppercase tracking-[0.2em] mt-1 block">V11 Elite Broadcast</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleVoice()" class="w-8 h-8 rounded-full flex items-center justify-center transition-colors ${state.voiceEnabled ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-800 text-slate-500'}">
                            <i data-lucide="${state.voiceEnabled ? 'volume-2' : 'volume-x'}" class="w-4 h-4"></i>
                        </button>
                        <div class="px-2.5 py-1 bg-emerald-500/10 rounded-full text-[7px] font-black text-emerald-400 border border-emerald-500/10 tracking-tighter uppercase italic">LIVE</div>
                    </div>
                </div>`;

            let mainContent = '';
            if (state.view === 'home') mainContent = renderHome();
            else if (state.view === 'play') mainContent = renderScoreboard() + renderOverTracer() + renderBallLog() + renderControls();
            else if (state.view === 'history') mainContent = renderHistoryList();
            else mainContent = renderStats();

            const nav = `
                <div class="mt-auto grid grid-cols-4 bg-[#0f172a]/95 backdrop-blur-3xl border-t border-white/5 pb-8 pt-3 px-2 gap-1 shrink-0">
                    <button onclick="setView('home')" class="flex flex-col items-center gap-1.5 ${state.view === 'home' ? 'text-emerald-400' : 'text-slate-500'}">
                        <div class="p-2 rounded-xl ${state.view === 'home' ? 'bg-emerald-500/10' : ''}"><i data-lucide="home" class="w-5 h-5"></i></div>
                        <span class="text-[7px] font-black uppercase italic leading-none">Home</span>
                    </button>
                    <button onclick="setView('history')" class="flex flex-col items-center gap-1.5 ${state.view === 'history' ? 'text-emerald-400' : 'text-slate-500'}">
                        <div class="p-2 rounded-xl ${state.view === 'history' ? 'bg-emerald-500/10' : ''}"><i data-lucide="history" class="w-5 h-5"></i></div>
                        <span class="text-[7px] font-black uppercase italic leading-none">History</span>
                    </button>
                    <button onclick="toggleSetupModal(true)" class="flex flex-col items-center gap-1 -mt-10 group">
                        <div class="w-14 h-14 bg-emerald-500 rounded-full flex items-center justify-center shadow-lg border-[5px] border-[#020617] text-white">
                             <i data-lucide="plus" class="w-7 h-7 stroke-[4]"></i>
                        </div>
                        <span class="text-[7px] font-black uppercase text-emerald-500 mt-1 italic">Match</span>
                    </button>
                    <button onclick="setView('stats')" class="flex flex-col items-center gap-1.5 ${state.view === 'stats' ? 'text-emerald-400' : 'text-slate-500'}">
                        <div class="p-2 rounded-xl ${state.view === 'stats' ? 'bg-emerald-500/10' : ''}"><i data-lucide="award" class="w-5 h-5"></i></div>
                        <span class="text-[7px] font-black uppercase italic leading-none">Elite</span>
                    </button>
                </div>`;

            container.innerHTML = header + mainContent + nav;

            if (state.showSetupModal) container.innerHTML += renderSetupModalHTML();
            if (state.showSecurityModal) container.innerHTML += renderSecurityModalHTML();
            if (state.selectedHistoryMatch !== null) container.innerHTML += renderMatchSummaryModalHTML(state.selectedHistoryMatch);
            if (state.match.status === 'innings_break') container.innerHTML += renderMessageModalHTML('Innings Over!', `Target: ${state.match.score + 1}`, 'Start Innings 2', 'window.startInnings2()');
            if (state.match.status === 'finished') container.innerHTML += renderVictoryModalHTML();

            appEl.appendChild(container);
            lucide.createIcons();
            const scrollContainer = document.getElementById('ball-scroll');
            if (scrollContainer) setTimeout(() => scrollContainer.scrollTo({ left: scrollContainer.scrollWidth, behavior: 'smooth' }), 100);
        }

        function renderHome() {
            const kWins = state.playerStats.Kaushal?.wins || 0;
            const sWins = state.playerStats.Sumit?.wins || 0;
            return `
                <div class="p-5 flex-1 overflow-y-auto space-y-8 no-scrollbar animate-in fade-in duration-500">
                    <div class="bg-gradient-to-br from-[#1e293b]/40 to-[#0f172a]/40 backdrop-blur-3xl rounded-[40px] p-8 border border-white/5 shadow-xl">
                        <h3 class="text-[9px] font-black text-slate-500 uppercase tracking-[0.4em] mb-8 text-center italic opacity-60">Standings</h3>
                        <div class="flex justify-between items-center px-2">
                            <div class="text-center w-1/3">
                                <div class="w-16 h-16 border border-emerald-500/20 rounded-2xl overflow-hidden mx-auto mb-3 shadow-lg bg-slate-900">
                                    <img src="${PLAYER_PHOTOS.Kaushal}" class="w-full h-full object-cover">
                                </div>
                                <p class="text-[9px] font-black text-white uppercase italic mb-1">Kaushal</p>
                                <span class="text-base font-black text-emerald-400 italic">${kWins}</span>
                            </div>
                            <div class="text-[9px] font-black text-slate-700 italic uppercase">VS</div>
                            <div class="text-center w-1/3">

                                <div class="text-right">

                                <div class="text-right">

                            </div>
                            ${renderInnings(m.innings1, 'First Innings')}
                            ${renderInnings(m.innings2, 'Second Innings')}
                        </div>
                        <div class="p-6 shrink-0"><button onclick="closeHistorySummary()" class="w-full bg-emerald-500 py-4 rounded-2xl font-black text-[10px] uppercase text-white italic">Close Summary</button></div>

                </div>`;
        }

        function renderScoreboard() {
            const m = state.match;
            const crr = m.balls > 0 ? ((m.score / m.balls) * 6).toFixed(2) : '0.00';
            const sr = m.liveBatter.balls > 0 ? ((m.liveBatter.runs / m.liveBatter.balls) * 100).toFixed(1) : '0.0';
            const econ = m.liveBowler.balls > 0 ? ((m.liveBowler.runs / m.liveBowler.balls) * 6).toFixed(1) : '0.0';
            return `
                <div class="px-5 pt-4 space-y-3 animate-in zoom-in-95 duration-300">
                    <div class="bg-[#1e293b]/30 border border-white/5 rounded-[40px] p-6 shadow-xl relative overflow-hidden">
                        <div class="flex justify-between items-start">
                             <div>
                                <p class="text-[9px] font-black text-slate-500 tracking-[0.2em] mb-2 italic uppercase">${m.battingTeam} Batting</p>
                                <h2 class="text-5xl font-black tracking-tighter leading-none italic text-white">${m.score}<span class="text-emerald-500 text-3xl mx-0.5 font-normal">/</span>${m.wickets}</h2>

                                <h3 class="text-2xl font-black tracking-tighter leading-none text-slate-200 italic">${formatOvers(m.balls)}</h3>

                            <div class="flex flex-col gap-1">
                                <span class="text-xs font-black text-white italic uppercase">${m.battingTeam}* <span class="text-emerald-400 text-lg">${m.liveBatter.runs}</span><span class="text-[9px] text-slate-500 ml-1">(${m.liveBatter.balls})</span></span>

                            </div>
                        </div>
                        <div class="flex items-center gap-3 text-right">

                        </div>
                    </div>
                </div>`;
        }

        function renderOverTracer() {
            const m = state.match;
            const log = m.ballLog || [];
            const currentOverBalls = [];
            let legalCount = 0;
            for(let i = log.length - 1; i >= 0; i--) {
                const b = log[i]; currentOverBalls.unshift(b);
                if (b.type !== 'wide' && b.type !== 'noball') legalCount++;
                if (legalCount === (m.balls % 6 === 0 && m.balls > 0 ? 6 : m.balls % 6)) break;
            }
            const slots = Array(6).fill(null);
            let ballIndex = 0;
            currentOverBalls.forEach(b => {
                if(ballIndex < 6) slots[ballIndex] = b;
                if(b.type !== 'wide' && b.type !== 'noball') ballIndex++;
            });
            return `
                <div class="px-5 mt-2">
                    <div class="bg-[#020617]/50 rounded-2xl border border-white/5 p-2.5 flex justify-between items-center">
                        <span class="text-[8px] font-black text-slate-600 uppercase italic ml-1">Over Tracer</span>
                        <div class="flex gap-1.5 mr-1">${slots.map((s) => {
                            let color = 'bg-white/5 border-white/5 text-slate-800'; let text = '';
                            if (s) {
                                text = s.run;
                                if (s.type === 'wicket') { color = 'bg-rose-500 border-rose-400 text-white'; text = 'W'; }
                                else if (s.run === 4) color = 'bg-blue-600 border-blue-400 text-white';
                                else if (s.run === 6) color = 'bg-amber-500 border-amber-400 text-white';
                                else if (s.type === 'wide') { color = 'bg-slate-800 text-slate-400'; text = 'wd'; }
                                else if (s.type === 'noball') { color = 'bg-slate-800 text-slate-400'; text = 'nb'; }
                                else color = 'bg-emerald-500/20 border-emerald-500/20 text-emerald-400';
                            }
                            return `<div class="w-6 h-6 rounded-lg border flex items-center justify-center text-[9px] font-black italic transition-all ${color}">${text}</div>`;
                        }).join('')}</div>
                    </div>
                </div>`;
        }

        function renderBallLog() {
            const log = state.match.ballLog || [];
            let htmlElements = [];
            log.forEach((ball, index) => {
                let colorClass = 'bg-[#1e293b]/60 border-white/5 text-slate-500';
                let ballText = ball.run;
                if (ball.type === 'wicket') { colorClass = 'bg-rose-600 border-rose-400 text-white'; ballText = 'W'; }
                else if (ball.run === 4) colorClass = 'bg-blue-600 border-blue-400 text-white';
                else if (ball.run === 6) colorClass = 'bg-amber-500 border-amber-400 text-white';
                else if (ball.type === 'wide') ballText = `${ball.run}WD`;
                else if (ball.type === 'noball') ballText = `${ball.run}NB`;
                const isNewest = index === log.length - 1;
                htmlElements.push(`<div class="w-11 h-11 shrink-0 rounded-xl border flex items-center justify-center font-black text-xs transition-all ${colorClass} italic ${isNewest ? 'animate-ball-pop' : ''}">${ballText}</div>`);
            });
            return `
                <div class="px-8 mt-3 mb-2 flex items-center bg-[#020617]/40 rounded-3xl h-16 relative overflow-hidden shadow-inner border border-white/5">
                    <div class="flex gap-3 px-4 flex-nowrap items-center w-full overflow-x-auto no-scrollbar" id="ball-scroll">
                        ${htmlElements.length === 0 ? '<p class="text-[9px] font-black text-slate-800 uppercase tracking-widest w-full text-center italic">Waiting...</p>' : htmlElements.slice(-10).join('')}

                    <button onclick="window.addBall(0, 'wide')" class="aspect-square rounded-2xl bg-[#0f172a] border border-white/5 text-slate-500 font-black text-[9px] uppercase italic border-b-2 border-b-black">WIDE</button>

                         <button onclick="window.undoLast()" class="py-4 rounded-2xl bg-[#1e293b]/30 border border-white/5 font-black text-[8px] uppercase text-slate-500 flex items-center justify-center gap-2 italic leading-none"><i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> UNDO</button>
                         <button onclick="window.abandonMatch()" class="py-4 rounded-2xl bg-rose-500/10 border border-rose-500/20 font-black text-[8px] uppercase text-rose-500 flex items-center justify-center gap-2 italic leading-none"><i data-lucide="octagon-x" class="w-3.5 h-3.5"></i> ABANDON</button>
                    </div>
                </div>`;
        }

                        <div class="flex bg-[#0f172a] rounded-xl p-1 border border-white/5">

                            <button onclick="setActiveStatsPlayer('Sumit')" class="px-4 py-2 rounded-lg text-[8px] font-black transition-all ${player === 'Sumit' ? 'bg-amber-500 text-white' : 'text-slate-600'} uppercase italic">Sumit</button>

                            <div class="bg-white/5 p-4 rounded-[24px] text-center border border-white/5"><p class="text-[7px] text-slate-600 font-black mb-1 italic uppercase">Wickets</p><p class="text-2xl font-black text-rose-500 italic leading-none">${stats.wickets}</p></div>
                            <div class="bg-white/5 p-4 rounded-[24px] text-center border border-white/5"><p class="text-[7px] text-slate-600 font-black mb-1 italic uppercase">Strike Rate</p><p class="text-2xl font-black text-emerald-400 italic leading-none">${sr}</p></div>

                            <div class="text-center bg-black/20 py-4 rounded-2xl border border-white/5"><p class="text-[7px] text-slate-600 font-black italic uppercase">4s</p><p class="text-lg font-black text-blue-400 italic">${stats.fours}</p></div>
                            <div class="text-center bg-black/20 py-4 rounded-2xl border border-white/5"><p class="text-[7px] text-slate-600 font-black italic uppercase">Matches</p><p class="text-lg font-black text-slate-400 italic">${stats.matches}</p></div>
                            <div class="text-center bg-emerald-500/10 py-4 rounded-2xl border border-emerald-500/20"><p class="text-[7px] text-emerald-500 font-black italic uppercase">Wins</p><p class="text-lg font-black text-emerald-400 italic">${stats.wins}</p></div>
                        </div>
                    </div>
                </div>`;

        function renderSetupModalHTML() {
            return `
                <div class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-[#020617]/95 backdrop-blur-2xl animate-in fade-in duration-300">

                            </div>
                            <div class="flex gap-4 pt-4">
                                 <button onclick="toggleSetupModal(false)" class="flex-1 py-6 rounded-[30px] bg-slate-900 font-black text-[11px] uppercase text-slate-600 italic">Cancel</button>
                                 <button onclick="finalizeMatchSetup()" class="flex-[2] py-6 rounded-[30px] bg-emerald-500 font-black text-[12px] uppercase text-white shadow-2xl shadow-emerald-500/30 italic tracking-[0.4em]">Launch Duel</button>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderSecurityModalHTML() {
            return `
                <div class="fixed inset-0 z-[100] flex items-center justify-center bg-[#020617]/95 backdrop-blur-2xl p-6">
                    <div class="w-full max-w-sm bg-[#0f172a] p-8 rounded-[40px] border border-white/5 shadow-2xl text-center">
                        <div class="w-16 h-16 bg-rose-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6"><i data-lucide="lock" class="text-rose-500 w-8 h-8"></i></div>
                        <h2 class="text-2xl font-black text-white uppercase italic tracking-tighter mb-2">Security Hub</h2>
                        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mb-8 italic opacity-60">Enter PIN to Wipe Archives</p>
                        <div class="space-y-6">
                            <input type="password" id="security-pass" placeholder="••••" class="w-full bg-black/40 border-2 ${state.securityError ? 'border-rose-500' : 'border-white/5'} rounded-2xl py-4 text-center text-2xl tracking-[1em] text-white focus:outline-none">
                            <div class="flex gap-4 pt-4">
                                <button onclick="toggleSecurityModal(false)" class="flex-1 py-5 rounded-2xl bg-slate-900 font-black text-[10px] uppercase text-slate-500 italic">Cancel</button>
                                <button onclick="verifyHistoryDelete()" class="flex-[2] py-5 rounded-2xl bg-rose-500 font-black text-[10px] uppercase text-white italic shadow-lg">Wipe Data</button>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderMessageModalHTML(title, msg, btnText, actionStr) {
            return `<div class="fixed inset-0 z-[110] flex items-center justify-center p-8 bg-[#020617]/99 backdrop-blur-3xl animate-in fade-in">
                <div class="w-full max-w-[300px] bg-[#1e293b]/60 border border-white/5 p-10 rounded-[40px] text-center shadow-2xl">
                    <h2 class="text-3xl font-black mb-4 text-white uppercase italic leading-none">${title}</h2>
                    <p class="text-slate-400 mb-10 font-bold text-[9px] uppercase tracking-widest opacity-60">${msg}</p>
                    <button onclick="${actionStr}" class="w-full bg-emerald-600 py-6 rounded-2xl font-black text-[10px] uppercase text-white shadow-lg italic">${btnText}</button>
                </div>
            </div>`;
        }

        function renderVictoryModalHTML() {
            const m = state.match;
            let confetti = '';
            for(let i=0; i<30; i++) {
                confetti += `<div class="confetti" style="left:${Math.random()*100}vw; animation-delay:${Math.random()*3}s; background:${['#10b981', '#fbbf24', '#3b82f6', '#f43f5e'][Math.floor(Math.random()*4)]}"></div>`;
            }
            return `<div class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-[#020617]/98 backdrop-blur-3xl animate-in fade-in duration-500">
                ${confetti}
                <div class="w-full max-w-[320px] bg-gradient-to-b from-[#1e3a8a]/40 to-[#020617] border border-emerald-500/20 p-10 rounded-[50px] text-center shadow-2xl relative z-[111]">
                    <div class="w-20 h-20 bg-emerald-500 rounded-3xl overflow-hidden mb-6 shadow-xl border-4 border-[#020617] mx-auto animate-bounce"><img src="${PLAYER_PHOTOS[m.winner]}" class="w-full h-full object-cover"></div>
                    <h2 class="text-4xl font-black mb-1 text-white uppercase italic leading-tight">${m.winner}</h2>
                    <p class="text-emerald-400 font-black text-[9px] uppercase tracking-[0.4em] mb-8 italic">Match Winner</p>
                    <div class="bg-black/40 rounded-[30px] p-6 mb-10 border border-white/5 w-full flex justify-around">
                        <div><p class="text-[7px] text-slate-600 font-black uppercase mb-1">Score</p><p class="text-2xl font-black text-white italic">${m.score}/${m.wickets}</p></div>
                        <div class="w-px h-6 bg-white/10 mt-2"></div>
                        <div><p class="text-[7px] text-slate-600 font-black uppercase mb-1">Overs</p><p class="text-2xl font-black text-white italic">${formatOvers(m.balls)}</p></div>
                    </div>
                    <button onclick="window.resetMatchAndRemove()" class="w-full bg-emerald-500 text-white py-5 rounded-3xl font-black text-[10px] uppercase italic">Close Arena</button>
                </div>
            </div>`;
        }

        window.onload = initApp;
    </script>
</head>
<body class="bg-[#020617]">
    <div id="app">
        <div class="h-screen w-screen flex flex-col items-center justify-center text-white gap-8">
            <div class="w-16 h-16 border-[6px] border-emerald-600 border-t-transparent rounded-2xl animate-spin shadow-2xl"></div>
            <div class="text-center">
                <p class="text-[10px] font-black tracking-[0.8em] text-emerald-400 uppercase mb-2 animate-pulse italic">Cricket Pro</p>
                <p class="text-slate-700 font-black text-[8px] uppercase italic tracking-widest">Syncing Arena...</p>
            </div>
        </div>
    </div>
</body>
</html>
