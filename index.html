<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cricket Pro - V11 Premium Elite</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/Gemini_Generated_Image_6n10tz6n10tz6n10.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Player Photos Mapping (using raw links for direct rendering)
        const PLAYER_PHOTOS = {
            Kaushal: "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/Gemini_Generated_Image_r34m8ur34m8ur34m.png",
            Sumit: "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/Gemini_Generated_Image_vv670gvv670gvv67.png"
        };

        // App Logic State
        const STORAGE_KEY = 'cricket_pro_v11_local_data_elite';
        const INITIAL_STATE = {
            view: 'home', 
            activeStatsPlayer: 'Sumit',
            showSetupModal: false,
            settings: { overs: 20, wickets: 2 },
            match: {
                innings: 1,
                battingTeam: 'Kaushal',
                bowlingTeam: 'Sumit',
                score: 0,
                wickets: 0,
                balls: 0,
                target: null,
                ballLog: [],
                status: 'idle', 
                winner: null,
                tossWinner: 'Kaushal',
                tossChoice: 'Bat',
                liveBatter: { runs: 0, balls: 0, fours: 0, sixes: 0 },
                liveBowler: { runs: 0, balls: 0, wickets: 0 }
            },
            playerStats: {
                Kaushal: { runs: 0, matches: 0, wins: 0, wickets: 0, sixes: 0, fours: 0, dots: 0, singles: 0, fifties: 0, hundreds: 0, ballsFaced: 0, highestScore: 0 },
                Sumit: { runs: 0, matches: 0, wins: 0, wickets: 0, sixes: 0, fours: 0, dots: 0, singles: 0, fifties: 0, hundreds: 0, ballsFaced: 0, highestScore: 0 }
            },
            matchHistory: []
        };

        let state = JSON.parse(JSON.stringify(INITIAL_STATE));

        function saveToLocal() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadFromLocal() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                state = { ...INITIAL_STATE, ...parsed };
                state.match = { ...INITIAL_STATE.match, ...parsed.match };
                state.playerStats = { ...INITIAL_STATE.playerStats, ...parsed.playerStats };
            }
            render();
        }

        window.initApp = function() {
            loadFromLocal();
        };

        window.addBall = function(run, type = 'normal') {
            if (state.match.status !== 'live') return;
            const ball = { run, type, id: Date.now() };
            
            if (type === 'wide' || type === 'noball') {
                state.match.score += (run + 1);
                state.match.liveBowler.runs += (run + 1);
                if (type === 'noball') {
                    state.match.liveBatter.runs += run;
                    state.match.liveBatter.balls += 1;
                }
            } else if (type === 'wicket') {
                state.match.wickets += 1;
                state.match.balls += 1;
                state.match.liveBatter.balls += 1;
                state.match.liveBowler.wickets += 1;
                state.match.liveBowler.balls += 1;
            } else {
                state.match.score += run;
                state.match.balls += 1;
                state.match.liveBatter.runs += run;
                state.match.liveBatter.balls += 1;
                state.match.liveBowler.runs += run;
                state.match.liveBowler.balls += 1;
                if (run === 4) state.match.liveBatter.fours += 1;
                if (run === 6) state.match.liveBatter.sixes += 1;
            }

            state.match.ballLog.push(ball);
            checkMatchProgress();
            render();
            saveToLocal();
        };

        window.undoLast = function() {
            if (state.match.ballLog.length === 0) return;
            const last = state.match.ballLog.pop();
            if (last.type === 'wide' || last.type === 'noball') {
                state.match.score -= (last.run + 1);
                state.match.liveBowler.runs -= (last.run + 1);
                if (last.type === 'noball') {
                    state.match.liveBatter.runs -= last.run;
                    state.match.liveBatter.balls -= 1;
                }
            } else if (last.type === 'wicket') {
                state.match.wickets -= 1;
                state.match.balls -= 1;
                state.match.liveBatter.balls -= 1;
                state.match.liveBowler.wickets -= 1;
                state.match.liveBowler.balls -= 1;
            } else {
                state.match.score -= last.run;
                state.match.balls -= 1;
                state.match.liveBatter.runs -= last.run;
                state.match.liveBatter.balls -= 1;
                state.match.liveBowler.runs -= last.run;
                state.match.liveBowler.balls -= 1;
                if (last.run === 4) state.match.liveBatter.fours -= 1;
                if (last.run === 6) state.match.liveBatter.sixes -= 1;
            }
            render();
            saveToLocal();
        };

        function checkMatchProgress() {
            const m = state.match;
            const totalBallsAllowed = state.settings.overs * 6;
            const isAllOut = m.wickets >= state.settings.wickets;
            const isOversDone = m.balls >= totalBallsAllowed;

            if (m.innings === 1) {
                if (isAllOut || isOversDone) m.status = 'innings_break';
            } else {
                if (m.score >= m.target) {
                    m.status = 'finished';
                    m.winner = m.battingTeam;
                    finishSequence();
                } else if (isAllOut || isOversDone) {
                    m.status = 'finished';
                    m.winner = m.bowlingTeam;
                    finishSequence();
                }
            }
        }

        function finishSequence() {
            updateCareerStats();
            saveToHistory();
        }

        function saveToHistory() {
            const m = state.match;
            const record = {
                winner: m.winner,
                battingTeam: m.battingTeam,
                bowlingTeam: m.bowlingTeam,
                score: m.score,
                wickets: m.wickets,
                overs: formatOvers(m.balls),
                timestamp: Date.now()
            };
            state.matchHistory.unshift(record);
            saveToLocal();
        }

        function updateCareerStats() {
            const m = state.match;
            const winner = m.winner;
            const loser = winner === 'Kaushal' ? 'Sumit' : 'Kaushal';
            const updatePlayer = (name, isWinner) => {
                const pStats = state.playerStats[name];
                pStats.matches = (pStats.matches || 0) + 1;
                if (isWinner) pStats.wins = (pStats.wins || 0) + 1;
                if (m.battingTeam === name) {
                    pStats.runs = (pStats.runs || 0) + m.score;
                    pStats.ballsFaced = (pStats.ballsFaced || 0) + m.balls;
                    if (m.score > (pStats.highestScore || 0)) pStats.highestScore = m.score;
                    if (m.score >= 100) pStats.hundreds = (pStats.hundreds || 0) + 1;
                    else if (m.score >= 50) pStats.fifties = (pStats.fifties || 0) + 1;
                    m.ballLog.forEach(b => {
                        if (b.run === 4) pStats.fours = (pStats.fours || 0) + 1;
                        if (b.run === 6) pStats.sixes = (pStats.sixes || 0) + 1;
                    });
                } else {
                    pStats.wickets = (pStats.wickets || 0) + m.wickets;
                }
            };
            updatePlayer(winner, true);
            updatePlayer(loser, false);
            saveToLocal();
        }

        window.startInnings2 = function() {
            state.match.target = state.match.score + 1;
            state.match.score = 0;
            state.match.wickets = 0;
            state.match.balls = 0;
            state.match.innings = 2;
            state.match.ballLog = [];
            state.match.status = 'live';
            state.match.liveBatter = { runs: 0, balls: 0, fours: 0, sixes: 0 };
            state.match.liveBowler = { runs: 0, balls: 0, wickets: 0 };
            const temp = state.match.battingTeam;
            state.match.battingTeam = state.match.bowlingTeam;
            state.match.bowlingTeam = temp;
            render();
            saveToLocal();
        };

        window.finalizeMatchSetup = function() {
            const tossWinner = state.match.tossWinner;
            const tossChoice = state.match.tossChoice;
            let bat, bowl;
            if (tossWinner === 'Kaushal') {
                bat = tossChoice === 'Bat' ? 'Kaushal' : 'Sumit';
                bowl = tossChoice === 'Bat' ? 'Sumit' : 'Kaushal';
            } else {
                bat = tossChoice === 'Bat' ? 'Sumit' : 'Kaushal';
                bowl = tossChoice === 'Bat' ? 'Kaushal' : 'Sumit';
            }
            state.match = { ...JSON.parse(JSON.stringify(INITIAL_STATE.match)), status: 'live', battingTeam: bat, bowlingTeam: bowl, tossWinner, tossChoice };
            const overlay = document.getElementById('setup-overlay');
            if (overlay) overlay.remove();
            state.showSetupModal = false;
            state.view = 'play';
            render();
            saveToLocal();
        };

        window.resetMatch = function() {
            state.match = JSON.parse(JSON.stringify(INITIAL_STATE.match));
            state.view = 'home';
            render();
            saveToLocal();
        };

        function formatOvers(balls) {
            const overs = Math.floor(balls / 6);
            const remainder = balls % 6;
            return `${overs}.${remainder}`;
        }

        window.setView = function(v) { state.view = v; render(); saveToLocal(); };
        window.toggleSetupModal = function(show) { state.showSetupModal = show; render(); };
        window.setSetting = function(key, val) { state.settings[key] = parseInt(val); render(); };
        window.setActiveStatsPlayer = function(name) { state.activeStatsPlayer = name; render(); };
        window.setTossWinner = function(name) { state.match.tossWinner = name; render(); };
        window.setTossChoice = function(choice) { state.match.tossChoice = choice; render(); };
        window.resetMatchAndRemove = function() { const modal = document.getElementById('victory-overlay'); if (modal) modal.remove(); window.resetMatch(); };

        function render() {
            const appEl = document.getElementById('app');
            if (!appEl) return;
            appEl.innerHTML = '';
            const container = document.createElement('div');
            container.className = 'max-w-md mx-auto h-screen bg-[#020617] text-white flex flex-col relative overflow-hidden font-sans';

            const header = `
                <div class="px-6 py-6 flex justify-between items-center bg-[#0f172a]/50 backdrop-blur-2xl border-b border-white/5 sticky top-0 z-50">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-emerald-800 rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-500/20 rotate-3 border border-emerald-400/30">
                            <i data-lucide="zap" class="w-6 h-6 text-white fill-white"></i>
                        </div>
                        <div>
                            <h1 class="text-base font-black tracking-[0.2em] leading-none uppercase italic text-emerald-50">Cricket Pro</h1>
                            <span class="text-[9px] text-emerald-400 font-black opacity-80 uppercase tracking-[0.3em] mt-1.5 block">V11 Elite Broadcast</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end">
                        <div class="px-3 py-1 bg-emerald-500/10 rounded-full text-[8px] font-black text-emerald-400 border border-emerald-500/20 tracking-tighter uppercase italic">
                            System Live
                        </div>
                    </div>
                </div>
            `;

            if (state.view === 'home') container.innerHTML = header + renderHome();
            else if (state.view === 'play') container.innerHTML = header + renderScoreboard() + renderBallLog() + renderControls();
            else container.innerHTML = header + renderStats();

            const nav = `
                <div class="mt-auto grid grid-cols-3 bg-[#0f172a]/95 backdrop-blur-3xl border-t border-white/5 pb-10 pt-4 px-6 gap-4">
                    <button onclick="setView('home')" class="flex flex-col items-center gap-2 transition-all ${state.view === 'home' ? 'text-emerald-400' : 'text-slate-500'}">
                        <div class="p-2.5 rounded-2xl transition-colors ${state.view === 'home' ? 'bg-emerald-500/10' : 'hover:bg-white/5'}"><i data-lucide="home" class="w-6 h-6"></i></div>
                        <span class="text-[9px] font-black uppercase tracking-widest italic">Home</span>
                    </button>
                    <button onclick="toggleSetupModal(true)" class="flex flex-col items-center gap-2 -mt-12 transition-all group">
                        <div class="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(16,185,129,0.5)] border-[6px] border-[#020617] text-white active:scale-90 transition-transform group-hover:scale-110">
                             <i data-lucide="plus" class="w-8 h-8 stroke-[4]"></i>
                        </div>
                        <span class="text-[9px] font-black uppercase tracking-[0.2em] text-emerald-500 mt-1 italic">New Match</span>
                    </button>
                    <button onclick="setView('stats')" class="flex flex-col items-center gap-2 transition-all ${state.view === 'stats' ? 'text-emerald-400' : 'text-slate-500'}">
                        <div class="p-2.5 rounded-2xl transition-colors ${state.view === 'stats' ? 'bg-emerald-500/10' : 'hover:bg-white/5'}"><i data-lucide="award" class="w-6 h-6"></i></div>
                        <span class="text-[9px] font-black uppercase tracking-widest italic">Hall Of Fame</span>
                    </button>
                </div>
            `;
            container.innerHTML += nav;
            appEl.appendChild(container);
            lucide.createIcons();

            const scrollContainer = document.getElementById('ball-scroll');
            if (scrollContainer) setTimeout(() => scrollContainer.scrollTo({ left: scrollContainer.scrollWidth, behavior: 'smooth' }), 100);

            if (state.showSetupModal) renderSetupModal();
            if (state.match.status === 'innings_break') renderModal('Innings Over!', `Target: ${state.match.score + 1}`, 'Start Innings 2', window.startInnings2);
            if (state.match.status === 'finished') renderVictoryModal();
        }

        function renderHome() {
            const kWins = state.playerStats.Kaushal?.wins || 0;
            const sWins = state.playerStats.Sumit?.wins || 0;
            const historyHtml = state.matchHistory.length > 0 
                ? state.matchHistory.slice(0, 5).map(m => `
                    <div class="bg-[#1e293b]/40 p-5 rounded-[32px] border border-white/5 flex justify-between items-center mb-4 hover:bg-[#1e293b]/60 transition-all">
                        <div class="flex flex-col gap-1">
                            <p class="text-[10px] font-black text-emerald-400 uppercase tracking-widest leading-none italic">${m.winner} WON MATCH</p>
                            <p class="text-sm font-bold text-white uppercase tracking-tighter opacity-80">${m.battingTeam} VS ${m.bowlingTeam}</p>
                        </div>
                        <div class="text-right flex flex-col gap-1">
                            <p class="text-xl font-black text-white italic leading-none">${m.score}/${m.wickets}</p>
                            <p class="text-[9px] text-slate-500 font-black uppercase tracking-[0.2em] leading-none">${m.overs} OVERS</p>
                        </div>
                    </div>
                `).join('')
                : `<div class="py-20 text-center bg-[#0f172a]/20 rounded-[48px] border border-dashed border-white/10 mx-2">
                    <i data-lucide="layout" class="w-10 h-10 text-slate-800 mx-auto mb-6 opacity-30"></i>
                    <p class="text-[11px] font-black text-slate-600 uppercase tracking-widest italic">Waiting for Match Archive</p>
                  </div>`;

            return `
                <div class="p-6 flex-1 overflow-y-auto space-y-12 no-scrollbar animate-in fade-in duration-500">
                    <div class="relative bg-gradient-to-br from-[#1e293b]/60 to-[#0f172a]/60 backdrop-blur-3xl rounded-[56px] p-10 border border-white/10 shadow-2xl overflow-hidden group">
                        <div class="absolute -top-10 -right-10 w-40 h-40 bg-emerald-500/5 blur-[100px] rounded-full group-hover:bg-emerald-500/10 transition-colors"></div>
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.6em] mb-12 text-center italic opacity-60">Symmetric Standings</h3>
                        <div class="flex justify-between items-center px-2 relative z-10">
                            <div class="text-center w-1/3">
                                <div class="w-20 h-20 border-2 border-emerald-500/30 rounded-[28px] overflow-hidden mx-auto mb-4 shadow-2xl transition-all transform hover:rotate-3 bg-slate-900">
                                    <img src="${PLAYER_PHOTOS.Kaushal}" class="w-full h-full object-cover">
                                </div>
                                <div class="flex flex-col items-center gap-1">
                                    <p class="text-[11px] font-black text-white uppercase tracking-[0.2em] italic">Kaushal</p>
                                    <span class="text-lg font-black text-emerald-400 leading-none italic">${kWins}</span>
                                </div>
                            </div>
                            <div class="flex-1 flex flex-col items-center gap-1 opacity-20">
                                <div class="w-px h-10 bg-slate-500"></div>
                                <div class="text-[10px] font-black text-slate-400 italic uppercase">vs</div>
                                <div class="w-px h-10 bg-slate-500"></div>
                            </div>
                            <div class="text-center w-1/3">
                                <div class="w-20 h-20 border-2 border-amber-500/30 rounded-[28px] overflow-hidden mx-auto mb-4 shadow-2xl transition-all transform hover:-rotate-3 bg-slate-900">
                                    <img src="${PLAYER_PHOTOS.Sumit}" class="w-full h-full object-cover">
                                </div>
                                <div class="flex flex-col items-center gap-1">
                                    <p class="text-[11px] font-black text-white uppercase tracking-[0.2em] italic">Sumit</p>
                                    <span class="text-lg font-black text-amber-400 leading-none italic">${sWins}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-8">
                        <div class="flex items-center justify-between px-2">
                            <h2 class="text-[11px] font-black uppercase tracking-[0.3em] text-slate-500 flex items-center gap-3">
                                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span> Live Stadium Hub
                            </h2>
                        </div>
                        ${state.match.status === 'live' || state.match.status === 'innings_break' ? `
                            <div onclick="setView('play')" class="group relative bg-gradient-to-r from-emerald-600/30 via-emerald-500/10 to-[#0f172a] p-8 rounded-[48px] border border-emerald-500/40 flex justify-between items-center cursor-pointer transition-all active:scale-95 shadow-2xl overflow-hidden">
                                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-10"></div>
                                <div class="relative z-10">
                                    <p class="text-[10px] font-black text-emerald-400 uppercase mb-3 animate-pulse tracking-[0.4em] italic">STADIUM LIVE FEED</p>
                                    <p class="text-2xl font-black text-white uppercase tracking-tight italic leading-none">${state.match.battingTeam} BATTING</p>
                                </div>
                                <div class="w-16 h-16 rounded-[22px] bg-emerald-500 flex items-center justify-center shadow-[0_0_30px_rgba(16,185,129,0.6)] group-hover:scale-110 transition-transform relative z-10">
                                    <i data-lucide="play" class="w-7 h-7 text-white fill-white ml-1"></i>
                                </div>
                            </div>
                        ` : ''}
                        <div class="mt-4">
                            <p class="text-[10px] font-black text-slate-700 uppercase tracking-[0.4em] mb-8 ml-3 italic opacity-60">Match Archive History</p>
                            ${historyHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderScoreboard() {
            const m = state.match;
            const crr = m.balls > 0 ? ((m.score / m.balls) * 6).toFixed(2) : '0.00';
            const sr = m.liveBatter.balls > 0 ? ((m.liveBatter.runs / m.liveBatter.balls) * 100).toFixed(1) : '0.0';
            const econ = m.liveBowler.balls > 0 ? ((m.liveBowler.runs / m.liveBowler.balls) * 6).toFixed(1) : '0.0';

            return `
                <div class="p-4 space-y-5 animate-in zoom-in-95 duration-500">
                    <div class="bg-[#1e293b]/40 border border-white/10 rounded-[60px] p-10 shadow-2xl relative overflow-hidden">
                        <div class="absolute -top-24 -right-24 w-60 h-60 bg-emerald-500/10 blur-[120px] rounded-full opacity-50"></div>
                        <div class="flex justify-between items-center mb-10 relative z-10">
                            <div class="flex items-center gap-3">
                                <div class="w-3 h-3 bg-rose-600 rounded-full animate-pulse shadow-[0_0_15px_rgba(225,29,72,0.8)]"></div>
                                <span class="text-[11px] font-black text-emerald-400 uppercase tracking-[0.3em] italic">Elite Broadcast</span>
                            </div>
                            <div class="bg-[#020617]/60 px-5 py-2 rounded-2xl border border-white/5 backdrop-blur-xl">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] italic">${state.settings.overs} Over Session</span>
                            </div>
                        </div>
                        <div class="flex items-end justify-between relative z-10 px-2">
                             <div>
                                <p class="text-[11px] font-black text-slate-500 uppercase tracking-[0.5em] mb-4 text-left italic leading-none opacity-80">${m.battingTeam.toUpperCase()} ON STRIKE</p>
                                <h2 class="text-8xl font-black tracking-tighter leading-none italic text-white">${m.score}<span class="text-emerald-500 text-6xl mx-1 font-normal opacity-90">/</span>${m.wickets}</h2>
                             </div>
                             <div class="text-right">
                                <div class="w-16 h-16 rounded-2xl border-2 border-emerald-500/30 overflow-hidden mb-3 shadow-lg mx-auto bg-slate-900">
                                    <img src="${PLAYER_PHOTOS[m.battingTeam]}" class="w-full h-full object-cover">
                                </div>
                                <h3 class="text-4xl font-black tracking-tighter leading-none mb-1 text-slate-200 italic">${formatOvers(m.balls)}</h3>
                                <p class="text-[12px] font-black text-slate-500 uppercase tracking-[0.4em] italic opacity-70">OVERS</p>
                             </div>
                        </div>
                        <div class="mt-10 pt-8 border-t border-white/10 flex justify-between items-center relative z-10">
                            <div class="flex flex-col gap-1">
                                <span class="text-[10px] font-black text-slate-600 uppercase tracking-[0.3em] italic opacity-80 px-1">CURRENT RUN RATE</span>
                                <span class="text-xl font-black text-emerald-400 italic leading-none">${crr}</span>
                            </div>
                             ${m.target ? `
                                <div class="text-right bg-amber-500/15 px-6 py-3 rounded-3xl border border-amber-500/20 shadow-xl">
                                    <span class="text-[11px] font-black text-amber-400 uppercase tracking-[0.3em] animate-pulse italic leading-none">Need ${m.target - m.score} runs in ${ (state.settings.overs * 6) - m.balls }</span>
                                </div>` : ''}
                        </div>
                    </div>
                    <div class="bg-[#1e293b]/30 border border-white/10 rounded-[40px] flex items-center justify-between px-10 py-6 shadow-xl backdrop-blur-xl">
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center gap-4">
                                <span class="text-base font-black text-white uppercase italic tracking-tighter">${m.battingTeam}*</span>
                                <span class="text-2xl font-black text-emerald-400 leading-none italic">${m.liveBatter.runs}<span class="text-xs text-slate-500 ml-1.5 opacity-60">(${m.liveBatter.balls})</span></span>
                            </div>
                            <div class="flex items-center gap-2 italic uppercase">
                                <span class="text-[8px] font-black text-slate-500 tracking-widest opacity-60">Strike Rate</span>
                                <span class="text-xs font-black text-slate-400">${sr}</span>
                            </div>
                        </div>
                        <div class="h-14 w-px bg-white/10 opacity-30"></div>
                        <div class="flex flex-col gap-2 text-right">
                            <div class="flex items-center gap-4 justify-end">
                                <span class="text-2xl font-black text-rose-500 leading-none italic">${m.liveBowler.wickets}<span class="text-xs text-slate-500 ml-1.5 opacity-60">-${formatOvers(m.liveBowler.balls)}</span></span>

        function renderBallLog() {
            const log = state.match.ballLog || [];
            let htmlElements = [];
            let legalBallCounter = 0;
            log.forEach((ball, index) => {
                let colorClass = 'bg-[#1e293b]/80 border-white/10 text-slate-400';
                let ballText = ball.run;
                let isNewest = index === log.length - 1;
                if (ball.type === 'wicket') { colorClass = 'bg-rose-600 border-rose-400 text-white shadow-[0_0_20px_rgba(225,29,72,0.5)]'; ballText = 'W'; }
                else if (ball.run === 4) { colorClass = 'bg-blue-600 border-blue-400 text-white shadow-[0_0_20px_rgba(37,99,235,0.5)]'; }
                else if (ball.run === 6) { colorClass = 'bg-amber-500 border-amber-400 text-white shadow-[0_0_20px_rgba(245,158,11,0.5)]'; }
                else if (ball.type === 'wide') ballText = `${ball.run}WD`;
                else if (ball.type === 'noball') ballText = `${ball.run}NB`;
                const animationClass = isNewest ? 'animate-ball-pop' : '';
                htmlElements.push(`<div class="w-14 h-14 shrink-0 rounded-2xl border-2 flex items-center justify-center font-black text-base transition-all ${colorClass} italic ${animationClass}">${ballText}</div>`);
                if (ball.type !== 'wide' && ball.type !== 'noball') {
                    legalBallCounter++;
                    if (legalBallCounter % 6 === 0 && legalBallCounter > 0) htmlElements.push(`<div class="h-12 w-[3px] bg-slate-800 shrink-0 mx-2 rounded-full opacity-40"></div>`);
                }
            });
            const finalDisplay = htmlElements.slice(-15);
            return `
                <div class="px-8 mb-4 overflow-hidden animate-in fade-in duration-700">
                    <div class="flex justify-between items-center mb-5 px-1">
                        <p class="text-[11px] font-black text-slate-500 uppercase tracking-[0.5em] italic leading-none opacity-50 uppercase">Over Log Stream</p>

                             <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                             <p class="text-[10px] font-black text-emerald-400 uppercase tracking-widest italic opacity-90 leading-none">Realtime</p>
