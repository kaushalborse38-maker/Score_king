<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cricket Pro - V11 Premium Elite</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/Gemini_Generated_Image_6n10tz6n10tz6n10.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow: hidden; 
            background-color: #020617;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .app-container {
            height: 100vh;
            height: 100dvh;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            display: flex;
            flex-direction: column;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .scale-in-center { animation: scale-in-center 0.4s cubic-bezier(0.175, 0.885, 0.320, 1.275) both; }
        @keyframes scale-in-center { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        @keyframes ball-pop {
            0% { transform: scale(0.5) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-ball-pop { animation: ball-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        .animate-spin-slow { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        button:active { transform: scale(0.94); }

        /* Victory Animations */
        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #10b981;
            top: -10px;
            z-index: 100;
            animation: confetti-fall 3s linear infinite;
        }
    </style>
    <script>
        const PLAYER_PHOTOS = {
            Kaushal: "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/Gemini_Generated_Image_r34m8ur34m8ur34m.png",
            Sumit: "https://raw.githubusercontent.com/kaushalborse38-maker/Score_king/main/Gemini_Generated_Image_vv670gvv670gvv67.png"
        };

        const STORAGE_KEY = 'cricket_pro_v11_local_data_elite';
        const INITIAL_STATE = {
            view: 'home', 
            activeStatsPlayer: 'Sumit',
            showSetupModal: false,
            showSecurityModal: false,
            securityError: false,
            settings: { overs: 20, wickets: 2 },
            match: {
                innings: 1,
                battingTeam: 'Kaushal',
                bowlingTeam: 'Sumit',
                score: 0,
                wickets: 0,
                balls: 0,
                target: null,
                ballLog: [],
                status: 'idle', 
                winner: null,
                tossWinner: 'Kaushal',
                tossChoice: 'Bat',
                liveBatter: { runs: 0, balls: 0, fours: 0, sixes: 0 },
                liveBowler: { runs: 0, balls: 0, wickets: 0 }
            },
            playerStats: {
                Kaushal: { runs: 0, matches: 0, wins: 0, wickets: 0, sixes: 0, fours: 0, dots: 0, singles: 0, fifties: 0, hundreds: 0, ballsFaced: 0, highestScore: 0 },
                Sumit: { runs: 0, matches: 0, wins: 0, wickets: 0, sixes: 0, fours: 0, dots: 0, singles: 0, fifties: 0, hundreds: 0, ballsFaced: 0, highestScore: 0 }
            },
            matchHistory: []
        };

        let state = JSON.parse(JSON.stringify(INITIAL_STATE));

        function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

        function loadFromLocal() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                state = { ...INITIAL_STATE, ...parsed };
                state.match = { ...INITIAL_STATE.match, ...parsed.match };
                state.playerStats = { ...INITIAL_STATE.playerStats, ...parsed.playerStats };
            }
            render();
        }

        window.initApp = function() { loadFromLocal(); };

        window.addBall = function(run, type = 'normal') {
            if (state.match.status !== 'live') return;
            const ball = { run, type, id: Date.now() };
            
            if (type === 'wide' || type === 'noball') {
                state.match.score += (run + 1);
                state.match.liveBowler.runs += (run + 1);
                if (type === 'noball') {
                    state.match.liveBatter.runs += run;
                    state.match.liveBatter.balls += 1;
                }
            } else if (type === 'wicket') {
                state.match.wickets += 1;
                state.match.balls += 1;
                state.match.liveBatter.balls += 1;
                state.match.liveBowler.wickets += 1;
                state.match.liveBowler.balls += 1;
            } else {
                state.match.score += run;
                state.match.balls += 1;
                state.match.liveBatter.runs += run;
                state.match.liveBatter.balls += 1;
                state.match.liveBowler.runs += run;
                state.match.liveBowler.balls += 1;
                if (run === 4) state.match.liveBatter.fours += 1;
                if (run === 6) state.match.liveBatter.sixes += 1;
            }

            state.match.ballLog.push(ball);
            checkMatchProgress();
            render();
            saveToLocal();
        };

        window.undoLast = function() {
            if (state.match.ballLog.length === 0) return;
            const last = state.match.ballLog.pop();
            if (last.type === 'wide' || last.type === 'noball') {
                state.match.score -= (last.run + 1);
                state.match.liveBowler.runs -= (last.run + 1);
                if (last.type === 'noball') {
                    state.match.liveBatter.runs -= last.run;
                    state.match.liveBatter.balls -= 1;
                }
            } else if (last.type === 'wicket') {
                state.match.wickets -= 1;
                state.match.balls -= 1;
                state.match.liveBatter.balls -= 1;
                state.match.liveBowler.wickets -= 1;
                state.match.liveBowler.balls -= 1;
            } else {
                state.match.score -= last.run;
                state.match.balls -= 1;
                state.match.liveBatter.runs -= last.run;
                state.match.liveBatter.balls -= 1;
                state.match.liveBowler.runs -= last.run;
                state.match.liveBowler.balls -= 1;
                if (last.run === 4) state.match.liveBatter.fours -= 1;
                if (last.run === 6) state.match.liveBatter.sixes -= 1;
            }
            render();
            saveToLocal();
        };

        function checkMatchProgress() {
            const m = state.match;
            const totalBallsAllowed = state.settings.overs * 6;
            const isAllOut = m.wickets >= state.settings.wickets;
            const isOversDone = m.balls >= totalBallsAllowed;

            if (m.innings === 1) {
                if (isAllOut || isOversDone) m.status = 'innings_break';
            } else {
                if (m.score >= m.target) {
                    m.status = 'finished';
                    m.winner = m.battingTeam;
                    finishSequence();
                } else if (isAllOut || isOversDone) {
                    m.status = 'finished';
                    m.winner = m.bowlingTeam;
                    finishSequence();
                }
            }
        }

        function finishSequence() { updateCareerStats(); saveToHistory(); }

        function saveToHistory() {
            const m = state.match;
            const record = {
                winner: m.winner,
                battingTeam: m.battingTeam,
                bowlingTeam: m.bowlingTeam,
                score: m.score,
                wickets: m.wickets,
                overs: formatOvers(m.balls),
                timestamp: Date.now()
            };
            state.matchHistory.unshift(record);
            saveToLocal();
        }

        function updateCareerStats() {
            const m = state.match;
            const winner = m.winner;
            const updatePlayer = (name, isWinner) => {
                const pStats = state.playerStats[name];
                pStats.matches = (pStats.matches || 0) + 1;
                if (isWinner) pStats.wins = (pStats.wins || 0) + 1;
                
                if (m.battingTeam === name) {
                    pStats.runs = (pStats.runs || 0) + m.score;
                    pStats.ballsFaced = (pStats.ballsFaced || 0) + m.balls;
                    if (m.score > (pStats.highestScore || 0)) pStats.highestScore = m.score;
                    if (m.score >= 100) pStats.hundreds = (pStats.hundreds || 0) + 1;
                    else if (m.score >= 50) pStats.fifties = (pStats.fifties || 0) + 1;
                    
                    m.ballLog.forEach(b => {
                        if (b.run === 4) pStats.fours = (pStats.fours || 0) + 1;
                        if (b.run === 6) pStats.sixes = (pStats.sixes || 0) + 1;
                    });
                } else { 
                    pStats.wickets = (pStats.wickets || 0) + m.wickets; 
                }
            };
            updatePlayer(m.battingTeam, winner === m.battingTeam);
            updatePlayer(m.bowlingTeam, winner === m.bowlingTeam);
            saveToLocal();
        }

        window.startInnings2 = function() {
            state.match.target = state.match.score + 1;
            state.match.score = 0;
            state.match.wickets = 0;
            state.match.balls = 0;
            state.match.innings = 2;
            state.match.ballLog = [];
            state.match.status = 'live';
            state.match.liveBatter = { runs: 0, balls: 0, fours: 0, sixes: 0 };
            state.match.liveBowler = { runs: 0, balls: 0, wickets: 0 };
            const temp = state.match.battingTeam;
            state.match.battingTeam = state.match.bowlingTeam;
            state.match.bowlingTeam = temp;
            render();
            saveToLocal();
        };

        window.abandonMatch = function() {
            state.match = JSON.parse(JSON.stringify(INITIAL_STATE.match));
            state.view = 'home';
            render();
            saveToLocal();
        };

        window.verifyHistoryDelete = function() {
            const input = document.getElementById('security-pass').value;
            if (input === '123') {
                state.matchHistory = [];
                state.playerStats = JSON.parse(JSON.stringify(INITIAL_STATE.playerStats));
                state.showSecurityModal = false;
                state.securityError = false;
                render();
                saveToLocal();
            } else {
                state.securityError = true;
                render();
            }
        };

        window.finalizeMatchSetup = function() {
            const tossWinner = state.match.tossWinner;
            const tossChoice = state.match.tossChoice;
            let bat, bowl;
            if (tossWinner === 'Kaushal') {
                bat = tossChoice === 'Bat' ? 'Kaushal' : 'Sumit';
                bowl = tossChoice === 'Bat' ? 'Sumit' : 'Kaushal';
            } else {
                bat = tossChoice === 'Bat' ? 'Sumit' : 'Kaushal';
                bowl = tossChoice === 'Bat' ? 'Kaushal' : 'Sumit';
            }
            
            const defaultMatch = INITIAL_STATE.match;
            state.match = {
                ...defaultMatch,
                status: 'live',
                battingTeam: bat,
                bowlingTeam: bowl,
                tossWinner,
                tossChoice,
                ballLog: [],
                liveBatter: { runs: 0, balls: 0, fours: 0, sixes: 0 },
                liveBowler: { runs: 0, balls: 0, wickets: 0 }
            };
            
            state.showSetupModal = false;
            state.view = 'play';
            render();
            setTimeout(saveToLocal, 50);
        };

        window.resetMatch = function() {
            state.match = JSON.parse(JSON.stringify(INITIAL_STATE.match));
            state.view = 'home';
            render();
            saveToLocal();
        };

        function formatOvers(balls) {
            const overs = Math.floor(balls / 6);
            const remainder = balls % 6;
            return `${overs}.${remainder}`;
        }

        window.setView = function(v) { state.view = v; render(); saveToLocal(); };
        window.toggleSetupModal = function(show) { state.showSetupModal = show; render(); };
        window.toggleSecurityModal = function(show) { 
            state.showSecurityModal = show; 
            state.securityError = false;
            render(); 
        };
        window.setSetting = function(key, val) { state.settings[key] = parseInt(val); render(); };
        window.setActiveStatsPlayer = function(name) { state.activeStatsPlayer = name; render(); };
        window.setTossWinner = function(name) { state.match.tossWinner = name; render(); };
        window.setTossChoice = function(choice) { state.match.tossChoice = choice; render(); };
        window.resetMatchAndRemove = function() { state.match.status = 'idle'; window.resetMatch(); };

        function render() {
            const appEl = document.getElementById('app');
            if (!appEl) return;
            
            appEl.innerHTML = '';
            const container = document.createElement('div');
            container.className = 'max-w-md mx-auto app-container bg-[#020617] text-white flex flex-col relative overflow-hidden font-sans';

            const header = `
                <div class="px-5 py-4 flex justify-between items-center bg-[#0f172a]/70 backdrop-blur-2xl border-b border-white/5 sticky top-0 z-50">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-emerald-800 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/10 rotate-3 border border-emerald-400/20">
                            <i data-lucide="zap" class="w-5 h-5 text-white fill-white"></i>
                        </div>
                        <div>
                            <h1 class="text-xs font-black tracking-[0.15em] leading-none uppercase italic text-emerald-50">Cricket Pro</h1>
                            <span class="text-[8px] text-emerald-400 font-black opacity-70 uppercase tracking-[0.2em] mt-1 block">V11 Elite Broadcast</span>
                        </div>
                    </div>
                    <div class="px-2.5 py-1 bg-emerald-500/10 rounded-full text-[7px] font-black text-emerald-400 border border-emerald-500/10 tracking-tighter uppercase italic">
                        Live Feed
                    </div>
                </div>
            `;

            let mainContent = '';
            if (state.view === 'home') mainContent = renderHome();
            else if (state.view === 'play') mainContent = renderScoreboard() + renderOverTracer() + renderBallLog() + renderControls();
            else mainContent = renderStats();

            const nav = `
                <div class="mt-auto grid grid-cols-3 bg-[#0f172a]/95 backdrop-blur-3xl border-t border-white/5 pb-8 pt-3 px-6 gap-4">
                    <button onclick="setView('home')" class="flex flex-col items-center gap-1.5 transition-all ${state.view === 'home' ? 'text-emerald-400' : 'text-slate-500'}">
                        <div class="p-2 rounded-xl transition-colors ${state.view === 'home' ? 'bg-emerald-500/10' : 'hover:bg-white/5'}"><i data-lucide="home" class="w-5 h-5"></i></div>
                        <span class="text-[8px] font-black uppercase tracking-widest italic leading-none">Home</span>
                    </button>
                    <button onclick="toggleSetupModal(true)" class="flex flex-col items-center gap-1 -mt-10 transition-all group">
                        <div class="w-14 h-14 bg-emerald-500 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(16,185,129,0.4)] border-[5px] border-[#020617] text-white">
                             <i data-lucide="plus" class="w-7 h-7 stroke-[4]"></i>
                        </div>
                        <span class="text-[8px] font-black uppercase tracking-[0.1em] text-emerald-500 mt-1 italic leading-none">Match</span>
                    </button>
                    <button onclick="setView('stats')" class="flex flex-col items-center gap-1.5 transition-all ${state.view === 'stats' ? 'text-emerald-400' : 'text-slate-500'}">
                        <div class="p-2 rounded-xl transition-colors ${state.view === 'stats' ? 'bg-emerald-500/10' : 'hover:bg-white/5'}"><i data-lucide="award" class="w-5 h-5"></i></div>
                        <span class="text-[8px] font-black uppercase tracking-widest italic leading-none">Elite</span>
                    </button>
                </div>
            `;

            container.innerHTML = header + mainContent + nav;

            if (state.showSetupModal) container.innerHTML += renderSetupModalHTML();
            if (state.showSecurityModal) container.innerHTML += renderSecurityModalHTML();
            if (state.match.status === 'innings_break') container.innerHTML += renderMessageModalHTML('Innings Over!', `Target: ${state.match.score + 1}`, 'Start Innings 2', 'window.startInnings2()');
            if (state.match.status === 'finished') container.innerHTML += renderVictoryModalHTML();

            appEl.appendChild(container);
            lucide.createIcons();

            const scrollContainer = document.getElementById('ball-scroll');
            if (scrollContainer) setTimeout(() => scrollContainer.scrollTo({ left: scrollContainer.scrollWidth, behavior: 'smooth' }), 100);
        }

        function renderHome() {
            const kWins = state.playerStats.Kaushal?.wins || 0;
            const sWins = state.playerStats.Sumit?.wins || 0;
            const historyHtml = state.matchHistory.length > 0 
                ? state.matchHistory.slice(0, 3).map(m => `
                    <div class="bg-[#1e293b]/30 p-4 rounded-[24px] border border-white/5 flex justify-between items-center mb-3">
                        <div class="flex flex-col gap-0.5">
                            <p class="text-[8px] font-black text-emerald-400 uppercase tracking-widest leading-none italic">${m.winner} WON</p>
                            <p class="text-xs font-bold text-white tracking-tighter opacity-80 uppercase">${m.battingTeam} v ${m.bowlingTeam}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-black text-white italic leading-none">${m.score}/${m.wickets}</p>
                            <p class="text-[8px] text-slate-500 font-black uppercase tracking-widest italic">${m.overs} ov</p>
                        </div>
                    </div>
                `).join('') + `
                    <button onclick="toggleSecurityModal(true)" class="w-full mt-4 flex items-center justify-center gap-2 py-3 rounded-2xl bg-rose-500/10 border border-rose-500/20 text-rose-500 text-[10px] font-black uppercase tracking-widest italic">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Clear Archive
                    </button>
                `
                : `<div class="py-10 text-center bg-[#0f172a]/20 rounded-[32px] border border-dashed border-white/5 mx-2">
                    <p class="text-[9px] font-black text-slate-700 uppercase tracking-widest italic">No History Available</p>
                  </div>`;

            return `
                <div class="p-5 flex-1 overflow-y-auto space-y-8 no-scrollbar animate-in fade-in duration-500">
                    <div class="relative bg-gradient-to-br from-[#1e293b]/40 to-[#0f172a]/40 backdrop-blur-3xl rounded-[40px] p-8 border border-white/5 shadow-xl overflow-hidden">
                        <h3 class="text-[9px] font-black text-slate-500 uppercase tracking-[0.4em] mb-8 text-center italic opacity-60 leading-none">Standings</h3>
                        <div class="flex justify-between items-center px-2 relative z-10">
                            <div class="text-center w-1/3">
                                <div class="w-16 h-16 border border-emerald-500/20 rounded-2xl overflow-hidden mx-auto mb-3 shadow-lg bg-slate-900">
                                    <img src="${PLAYER_PHOTOS.Kaushal}" class="w-full h-full object-cover">
                                </div>
                                <p class="text-[9px] font-black text-white uppercase italic mb-1">Kaushal</p>
                                <span class="text-base font-black text-emerald-400 italic leading-none">${kWins}</span>
                            </div>
                            <div class="text-[9px] font-black text-slate-700 italic uppercase">VS</div>
                            <div class="text-center w-1/3">
                                <div class="w-16 h-16 border border-amber-500/20 rounded-2xl overflow-hidden mx-auto mb-3 shadow-lg bg-slate-900">
                                    <img src="${PLAYER_PHOTOS.Sumit}" class="w-full h-full object-cover">
                                </div>
                                <p class="text-[9px] font-black text-white uppercase italic mb-1">Sumit</p>
                                <span class="text-base font-black text-amber-400 italic leading-none">${sWins}</span>
                            </div>
                        </div>
                    </div>
                    <div>
                        <h2 class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-500 mb-5 ml-2 italic leading-none">Recent History</h2>
                        ${historyHtml}
                        ${state.match.status === 'live' || state.match.status === 'innings_break' ? `
                            <button onclick="setView('play')" class="w-full mt-6 bg-emerald-500/10 text-emerald-400 p-6 rounded-[30px] border border-emerald-500/20 flex justify-between items-center">
                                <div class="text-left">
                                    <p class="text-[8px] font-black tracking-widest italic uppercase mb-1">In Progress</p>
                                    <p class="text-xl font-black uppercase italic leading-none">Resume Match</p>
                                </div>
                                <i data-lucide="chevron-right" class="w-6 h-6"></i>
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderScoreboard() {
            const m = state.match;
            const crr = m.balls > 0 ? ((m.score / m.balls) * 6).toFixed(2) : '0.00';
            const sr = m.liveBatter.balls > 0 ? ((m.liveBatter.runs / m.liveBatter.balls) * 100).toFixed(1) : '0.0';
            const econ = m.liveBowler.balls > 0 ? ((m.liveBowler.runs / m.liveBowler.balls) * 6).toFixed(1) : '0.0';

            return `
                <div class="px-5 pt-4 space-y-3 animate-in zoom-in-95 duration-300">
                    <div class="bg-[#1e293b]/30 border border-white/5 rounded-[40px] p-6 shadow-xl relative overflow-hidden">
                        <div class="flex justify-between items-start relative z-10">
                             <div>
                                <p class="text-[9px] font-black text-slate-500 tracking-[0.2em] mb-2 italic leading-none uppercase">${m.battingTeam} Batting</p>
                                <h2 class="text-5xl font-black tracking-tighter leading-none italic text-white">${m.score}<span class="text-emerald-500 text-3xl mx-0.5 font-normal opacity-80">/</span>${m.wickets}</h2>
                             </div>
                             <div class="text-right">
                                <h3 class="text-2xl font-black tracking-tighter leading-none mb-0.5 text-slate-200 italic">${formatOvers(m.balls)}</h3>
                                <p class="text-[8px] font-black text-slate-500 uppercase tracking-widest italic opacity-70">Overs</p>
                             </div>
                        </div>
                        <div class="mt-6 pt-5 border-t border-white/5 flex justify-between items-center relative z-10">
                            <div class="flex flex-col gap-0.5">
                                <span class="text-[8px] font-black text-slate-600 uppercase tracking-widest italic opacity-60">Run Rate</span>
                                <span class="text-lg font-black text-emerald-400 italic leading-none">${crr}</span>
                            </div>
                             ${m.target ? `
                                <div class="text-right bg-amber-500/10 px-4 py-2 rounded-2xl border border-amber-500/10">
                                    <span class="text-[9px] font-black text-amber-400 uppercase italic leading-none tracking-widest">Need ${m.target - m.score} runs</span>
                                </div>` : ''}
                        </div>
                    </div>
                    <div class="bg-[#1e293b]/20 border border-white/5 rounded-[28px] flex items-center justify-between px-6 py-4 shadow-lg backdrop-blur-xl">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl overflow-hidden border border-emerald-500/20 bg-slate-900 shrink-0">
                                <img src="${PLAYER_PHOTOS[m.battingTeam]}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex flex-col gap-1">
                                <span class="text-xs font-black text-white italic tracking-tighter uppercase leading-none">${m.battingTeam}* <span class="text-emerald-400 text-lg">${m.liveBatter.runs}</span><span class="text-[9px] text-slate-500 ml-1">(${m.liveBatter.balls})</span></span>
                                <span class="text-[7px] font-black text-slate-600 uppercase tracking-widest">SR ${sr}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 text-right">
                            <div class="flex flex-col gap-1">
                                <span class="text-xs font-black text-white italic tracking-tighter uppercase leading-none"><span class="text-rose-500 text-lg">${m.liveBowler.wickets}</span><span class="text-[9px] text-slate-500 mr-1">-${formatOvers(m.liveBowler.balls)}</span> ${m.bowlingTeam}</span>
                                <span class="text-[7px] font-black text-slate-600 uppercase tracking-widest">ECON ${econ}</span>
                            </div>
                            <div class="w-10 h-10 rounded-xl overflow-hidden border border-rose-500/20 bg-slate-900 shrink-0">
                                <img src="${PLAYER_PHOTOS[m.bowlingTeam]}" class="w-full h-full object-cover">
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOverTracer() {
            const m = state.match;
            const log = m.ballLog || [];
            const currentOverBalls = [];
            let legalCount = 0;
            for(let i = log.length - 1; i >= 0; i--) {
                const b = log[i];
                currentOverBalls.unshift(b);
                if (b.type !== 'wide' && b.type !== 'noball') legalCount++;
                if (legalCount === (m.balls % 6 === 0 && m.balls > 0 ? 6 : m.balls % 6)) break;
            }
            const slots = Array(6).fill(null);
            let ballIndex = 0;
            currentOverBalls.forEach(b => {
                if(ballIndex < 6) slots[ballIndex] = b;
                if(b.type !== 'wide' && b.type !== 'noball') ballIndex++;
            });
            return `
                <div class="px-5 mt-2">
                    <div class="bg-[#020617]/50 rounded-2xl border border-white/5 p-2.5 flex justify-between items-center">
                        <span class="text-[8px] font-black text-slate-600 uppercase tracking-widest italic ml-1">Over Tracer</span>
                        <div class="flex gap-1.5 mr-1">${slots.map((s, idx) => {
                            let color = 'bg-white/5 border-white/5 text-slate-800';
                            let text = '';
                            if (s) {
                                text = s.run;
                                if (s.type === 'wicket') { color = 'bg-rose-500 border-rose-400 text-white'; text = 'W'; }
                                else if (s.run === 4) color = 'bg-blue-600 border-blue-400 text-white';
                                else if (s.run === 6) color = 'bg-amber-500 border-amber-400 text-white';
                                else if (s.type === 'wide') { color = 'bg-slate-800 text-slate-400'; text = 'wd'; }
                                else if (s.type === 'noball') { color = 'bg-slate-800 text-slate-400'; text = 'nb'; }
                                else color = 'bg-emerald-500/20 border-emerald-500/20 text-emerald-400';
                            }
                            return `<div class="w-6 h-6 rounded-lg border flex items-center justify-center text-[9px] font-black italic transition-all ${color}">${text}</div>`;
                        }).join('')}</div>
                    </div>
                </div>
            `;
        }

        function renderBallLog() {
            const log = state.match.ballLog || [];
            let htmlElements = [];
            log.forEach((ball, index) => {
                let colorClass = 'bg-[#1e293b]/60 border-white/5 text-slate-500';
                let ballText = ball.run;
                if (ball.type === 'wicket') { colorClass = 'bg-rose-600 border-rose-400 text-white'; ballText = 'W'; }
                else if (ball.run === 4) colorClass = 'bg-blue-600 border-blue-400 text-white';
                else if (ball.run === 6) colorClass = 'bg-amber-500 border-amber-400 text-white';
                else if (ball.type === 'wide') ballText = `${ball.run}WD`;
                else if (ball.type === 'noball') ballText = `${ball.run}NB`;
                const isNewest = index === log.length - 1;
                htmlElements.push(`<div class="w-11 h-11 shrink-0 rounded-xl border flex items-center justify-center font-black text-xs transition-all ${colorClass} italic ${isNewest ? 'animate-ball-pop' : ''}">${ballText}</div>`);
            });
            return `
                <div class="px-8 mt-3 mb-2 flex items-center bg-[#020617]/40 rounded-3xl h-16 relative overflow-hidden shadow-inner border border-white/5">
                    <div class="flex gap-3 px-4 flex-nowrap items-center w-full overflow-x-auto no-scrollbar" id="ball-scroll">
                        ${htmlElements.length === 0 ? '<p class="text-[9px] font-black text-slate-800 uppercase tracking-widest w-full text-center italic">Waiting...</p>' : htmlElements.slice(-10).join('')}
                    </div>
                </div>
            `;
        }

        function renderControls() {
            return `
                <div class="px-6 pb-2 pt-2 grid grid-cols-4 gap-3 bg-[#020617]/80 mt-auto border-t border-white/5">
                    ${[0,1,2,3].map(r => `<button onclick="window.addBall(${r})" class="aspect-square rounded-2xl bg-[#1e293b]/40 border border-white/5 flex items-center justify-center transition-all shadow-lg text-xl font-black italic text-slate-400 border-b-2 border-b-black">${r}</button>`).join('')}
                    <button onclick="window.addBall(4)" class="aspect-square rounded-2xl bg-blue-600 border border-blue-400 text-white shadow-lg flex items-center justify-center font-black text-2xl italic border-b-2 border-b-blue-800">4</button>
                    <button onclick="window.addBall(6)" class="aspect-square rounded-2xl bg-amber-500 border border-amber-400 text-white shadow-lg flex items-center justify-center font-black text-2xl italic border-b-2 border-b-amber-700">6</button>
                    <button onclick="window.addBall(0, 'wide')" class="aspect-square rounded-2xl bg-[#0f172a] border border-white/5 text-slate-500 font-black text-[9px] transition-all uppercase tracking-tighter italic border-b-2 border-b-black">WIDE</button>
                    <button onclick="window.addBall(0, 'wicket')" class="aspect-square rounded-2xl bg-rose-600 border border-rose-400 text-white shadow-lg flex items-center justify-center italic border-b-2 border-b-rose-900"><i data-lucide="skull" class="w-7 h-7"></i></button>
                    <div class="col-span-4 grid grid-cols-3 gap-3 mb-2">
                         <button onclick="window.addBall(0, 'noball')" class="py-4 rounded-2xl bg-[#1e293b]/30 border border-white/5 font-black text-[8px] uppercase tracking-widest text-slate-500 flex items-center justify-center gap-2 italic leading-none"><i data-lucide="footprints" class="w-3.5 h-3.5"></i> NO BALL</button>
                         <button onclick="window.undoLast()" class="py-4 rounded-2xl bg-[#1e293b]/30 border border-white/5 font-black text-[8px] uppercase tracking-widest text-slate-500 flex items-center justify-center gap-2 italic leading-none"><i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> UNDO</button>
                         <button onclick="window.abandonMatch()" class="py-4 rounded-2xl bg-rose-500/10 border border-rose-500/20 font-black text-[8px] uppercase tracking-widest text-rose-500 flex items-center justify-center gap-2 italic leading-none"><i data-lucide="octagon-x" class="w-3.5 h-3.5"></i> ABANDON</button>
                    </div>
                </div>
            `;
        }

        function renderStats() {
            const player = state.activeStatsPlayer;
            const stats = state.playerStats[player] || INITIAL_STATE.playerStats[player];
            const sr = stats.ballsFaced > 0 ? ((stats.runs / stats.ballsFaced) * 100).toFixed(1) : '0.0';
            return `
                <div class="p-5 flex-1 overflow-y-auto space-y-8 no-scrollbar animate-in fade-in duration-500">
                    <div class="flex items-center justify-between gap-3">
                        <h2 class="text-xl font-black italic uppercase leading-none">Hall Of Fame</h2>
                        <div class="flex bg-[#0f172a] rounded-xl p-1 border border-white/5">
                            <button onclick="setActiveStatsPlayer('Kaushal')" class="px-4 py-2 rounded-lg text-[8px] font-black transition-all ${player === 'Kaushal' ? 'bg-emerald-500 text-white' : 'text-slate-600'} uppercase italic">Kaushal</button>
                            <button onclick="setActiveStatsPlayer('Sumit')" class="px-4 py-2 rounded-lg text-[8px] font-black transition-all ${player === 'Sumit' ? 'bg-amber-500 text-white' : 'text-slate-600'} uppercase italic">Sumit</button>
                        </div>
                    </div>
                    <div class="bg-gradient-to-br from-[#1e293b]/40 to-[#020617] rounded-[40px] p-6 border border-white/5 shadow-xl">
                        <div class="flex justify-between items-center mb-8">
                             <div class="flex flex-col gap-1">
                                <h3 class="text-3xl font-black text-white uppercase italic leading-none">${player}</h3>
                                <p class="text-[8px] font-black text-slate-500 tracking-[0.4em] uppercase italic leading-none">Elite Champion</p>
                             </div>
                             <img src="${PLAYER_PHOTOS[player]}" class="w-14 h-14 rounded-2xl border border-emerald-500/20 object-cover shadow-lg bg-slate-900">
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-white/5 p-5 rounded-[24px] text-center border border-white/5"><p class="text-[8px] text-slate-600 font-black mb-1 italic">Total Runs</p><p class="text-3xl font-black text-white italic leading-none">${stats.runs}</p></div>
                            <div class="bg-white/5 p-5 rounded-[24px] text-center border border-white/5"><p class="text-[8px] text-slate-600 font-black mb-1 italic">Strike Rate</p><p class="text-3xl font-black text-emerald-400 italic leading-none">${sr}</p></div>
                        </div>
                        <div class="grid grid-cols-3 gap-3 mb-6">
                            <div class="text-center bg-black/20 py-4 rounded-2xl border border-white/5"><p class="text-[7px] text-slate-600 font-black italic uppercase">Highest</p><p class="text-xl font-black text-white italic leading-none mt-1">${stats.highestScore || 0}</p></div>
                            <div class="text-center bg-black/20 py-4 rounded-2xl border border-white/5"><p class="text-[7px] text-slate-600 font-black italic uppercase">100s</p><p class="text-xl font-black text-amber-500 italic leading-none mt-1">${stats.hundreds || 0}</p></div>
                            <div class="text-center bg-black/20 py-4 rounded-2xl border border-white/5"><p class="text-[7px] text-slate-600 font-black italic uppercase">50s</p><p class="text-xl font-black text-blue-500 italic leading-none mt-1">${stats.fifties || 0}</p></div>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="text-center bg-black/20 py-4 rounded-2xl border border-white/5"><p class="text-[7px] text-slate-600 font-black italic">6s</p><p class="text-xl font-black text-amber-400 italic leading-none">${stats.sixes}</p></div>
                            <div class="text-center bg-black/20 py-4 rounded-2xl border border-white/5"><p class="text-[7px] text-slate-600 font-black italic">4s</p><p class="text-xl font-black text-blue-400 italic leading-none">${stats.fours}</p></div>
                            <div class="text-center bg-emerald-500/10 py-4 rounded-2xl border border-emerald-500/20"><p class="text-[7px] text-emerald-500 font-black italic uppercase">Wins</p><p class="text-xl font-black text-emerald-400 italic leading-none">${stats.wins}</p></div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSetupModalHTML() {
            return `
                <div class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-[#020617]/95 backdrop-blur-2xl animate-in fade-in duration-300">
                    <div class="w-full max-w-md bg-[#0f172a] p-8 pb-12 rounded-t-[50px] border-t border-emerald-500/20 shadow-2xl animate-in slide-in-from-bottom duration-500 overflow-y-auto max-h-[90vh] no-scrollbar">
                        <div class="w-16 h-1.5 bg-slate-800 rounded-full mx-auto mb-10 opacity-50"></div>
                        <div class="flex items-center gap-5 mb-10 px-2">
                            <div class="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center border border-emerald-500/30"><i data-lucide="settings" class="text-emerald-400 w-6 h-6 animate-spin-slow"></i></div>
                            <div><h2 class="text-2xl font-black text-white uppercase italic tracking-tighter leading-none">Configure Duel</h2><p class="text-slate-600 text-[10px] font-black uppercase tracking-[0.4em] mt-2 italic leading-none">V11 Elite Setup</p></div>
                        </div>
                        <div class="space-y-12">
                            <div class="text-center">
                                <p class="text-[10px] font-black text-slate-500 tracking-[0.5em] mb-5 uppercase italic opacity-80 leading-none">MATCH OVERS</p>
                                <div class="grid grid-cols-2 gap-4">${[10, 20].map(o => `<button onclick="setSetting('overs', ${o})" class="py-6 rounded-3xl border transition-all font-black text-[12px] ${state.settings.overs === o ? 'bg-emerald-500 border-emerald-400 text-white shadow-xl shadow-emerald-500/20' : 'border-white/5 bg-black/20 text-slate-600'} italic uppercase tracking-widest leading-none">${o} OVERS</button>`).join('')}</div>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] font-black text-slate-500 tracking-[0.5em] mb-5 uppercase italic opacity-80 leading-none">WICKET LIMIT</p>
                                <div class="grid grid-cols-4 gap-3">${[1, 2, 5, 10].map(w => `<button onclick="setSetting('wickets', ${w})" class="py-5 rounded-2xl border transition-all font-black text-sm ${state.settings.wickets === w ? 'bg-rose-600 border-rose-400 text-white shadow-lg shadow-rose-600/20' : 'border-white/5 bg-black/20 text-slate-600'} italic leading-none">${w}</button>`).join('')}</div>
                            </div>
                            <div class="text-center">
                                <p class="text-[10px] font-black text-slate-500 tracking-[0.5em] mb-5 uppercase italic opacity-80 leading-none">TOSS DECISION</p>
                                <div class="grid grid-cols-2 gap-4 mb-6">
                                    <button onclick="setTossWinner('Kaushal')" class="py-5 rounded-2xl border transition-all font-black text-[11px] ${state.match.tossWinner === 'Kaushal' ? 'bg-white text-black border-white shadow-lg' : 'border-white/5 bg-black/20 text-slate-600'} uppercase italic tracking-widest leading-none flex items-center justify-center gap-3"><div class="w-5 h-5 rounded-lg overflow-hidden border border-slate-500"><img src="${PLAYER_PHOTOS.Kaushal}" class="w-full h-full object-cover"></div> Kaushal</button>
                                    <button onclick="setTossWinner('Sumit')" class="py-5 rounded-2xl border transition-all font-black text-[11px] ${state.match.tossWinner === 'Sumit' ? 'bg-white text-black border-white shadow-lg' : 'border-white/5 bg-black/20 text-slate-600'} uppercase italic tracking-widest leading-none flex items-center justify-center gap-3"><div class="w-5 h-5 rounded-lg overflow-hidden border border-slate-500"><img src="${PLAYER_PHOTOS.Sumit}" class="w-full h-full object-cover"></div> Sumit</button>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <button onclick="setTossChoice('Bat')" class="py-5 rounded-2xl border transition-all font-black text-[10px] ${state.match.tossChoice === 'Bat' ? 'bg-amber-500 text-black border-amber-400 shadow-lg' : 'border-white/5 bg-black/20 text-slate-600'} uppercase italic tracking-widest leading-none">Bat First</button>
                                    <button onclick="setTossChoice('Bowl')" class="py-5 rounded-2xl border transition-all font-black text-[10px] ${state.match.tossChoice === 'Bowl' ? 'bg-amber-500 text-black border-amber-400 shadow-lg' : 'border-white/5 bg-black/20 text-slate-600'} uppercase italic tracking-widest leading-none">Bowl First</button>
                                </div>
                            </div>
                            <div class="flex gap-4 pt-4">
                                 <button onclick="toggleSetupModal(false)" class="flex-1 py-6 rounded-[30px] bg-slate-900 font-black text-[11px] uppercase text-slate-600 italic tracking-[0.2em] leading-none">Cancel</button>
                                 <button id="launch-btn" onclick="finalizeMatchSetup()" class="flex-[2] py-6 rounded-[30px] bg-emerald-500 font-black text-[12px] uppercase text-white shadow-2xl shadow-emerald-500/30 italic tracking-[0.4em] leading-none border-b-4 border-emerald-700">Launch Duel</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSecurityModalHTML() {
            return `
                <div class="fixed inset-0 z-[100] flex items-center justify-center bg-[#020617]/95 backdrop-blur-2xl animate-in fade-in duration-300 p-6">
                    <div class="w-full max-w-sm bg-[#0f172a] p-8 rounded-[40px] border border-white/5 shadow-2xl text-center">
                        <div class="w-16 h-16 bg-rose-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="lock" class="text-rose-500 w-8 h-8"></i>
                        </div>
                        <h2 class="text-2xl font-black text-white uppercase italic tracking-tighter leading-none mb-2">Restricted Action</h2>
                        <p class="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] mb-8 italic opacity-60">Enter PIN to Clear Archive</p>
                        
                        <div class="space-y-6">
                            <input type="password" id="security-pass" placeholder="••••" 
                                class="w-full bg-black/40 border-2 ${state.securityError ? 'border-rose-500' : 'border-white/5'} rounded-2xl py-4 text-center text-2xl tracking-[1em] text-white focus:outline-none transition-colors">
                            
                            ${state.securityError ? `<p class="text-[9px] font-black text-rose-500 uppercase italic tracking-widest animate-pulse">Invalid Credentials</p>` : ''}

                            <div class="flex gap-4 pt-4">
                                <button onclick="toggleSecurityModal(false)" class="flex-1 py-5 rounded-2xl bg-slate-900 font-black text-[10px] uppercase text-slate-500 italic">Cancel</button>
                                <button onclick="verifyHistoryDelete()" class="flex-[2] py-5 rounded-2xl bg-rose-500 font-black text-[10px] uppercase text-white italic shadow-lg shadow-rose-500/20 border-b-4 border-rose-700">Wipe Data</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMessageModalHTML(title, msg, btnText, actionStr) {
            return `<div class="fixed inset-0 z-[110] flex items-center justify-center p-8 bg-[#020617]/99 backdrop-blur-3xl animate-in fade-in duration-300">
                <div class="w-full max-w-[300px] bg-[#1e293b]/60 border border-white/5 p-10 rounded-[40px] text-center shadow-2xl relative">
                    <div class="w-16 h-16 bg-emerald-500/10 rounded-2xl flex items-center justify-center mx-auto mb-6"><i data-lucide="info" class="text-emerald-400"></i></div>
                    <h2 class="text-3xl font-black mb-4 text-white uppercase italic leading-none">${title}</h2>
                    <p class="text-slate-400 mb-10 font-bold text-[9px] uppercase tracking-widest opacity-60">${msg}</p>
                    <button onclick="${actionStr}" class="w-full bg-emerald-600 py-6 rounded-2xl font-black text-[10px] uppercase text-white shadow-lg italic">${btnText}</button>
                </div>
            </div>`;
        }

        function renderVictoryModalHTML() {
            const m = state.match;
            let confettiHtml = '';
            for(let i=0; i<30; i++) {
                const left = Math.random() * 100;
                const delay = Math.random() * 3;
                const color = ['#10b981', '#fbbf24', '#3b82f6', '#f43f5e'][Math.floor(Math.random()*4)];
                confettiHtml += `<div class="confetti" style="left:${left}vw; animation-delay:${delay}s; background:${color}"></div>`;
            }
            return `<div class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-[#020617]/98 backdrop-blur-3xl animate-in fade-in duration-500">
                ${confettiHtml}
                <div class="w-full max-w-[320px] bg-gradient-to-b from-[#1e3a8a]/40 to-[#020617] border border-emerald-500/20 p-10 rounded-[50px] text-center shadow-2xl flex flex-col items-center relative z-[111]">
                    <div class="w-20 h-20 bg-emerald-500 rounded-3xl overflow-hidden mb-6 shadow-xl border-4 border-[#020617] animate-bounce"><img src="${PLAYER_PHOTOS[m.winner]}" class="w-full h-full object-cover"></div>
                    <h2 class="text-4xl font-black mb-1 text-white uppercase italic leading-tight">${m.winner}</h2>
                    <p class="text-emerald-400 font-black text-[9px] uppercase tracking-[0.4em] mb-8 italic">Match Winner</p>
                    <div class="bg-black/40 rounded-[30px] p-6 mb-10 border border-white/5 w-full flex justify-around items-center">
                        <div><p class="text-[7px] text-slate-600 font-black uppercase mb-1 tracking-widest">Score</p><p class="text-2xl font-black text-white italic leading-none">${m.score}/${m.wickets}</p></div>
                        <div class="w-px h-6 bg-white/10"></div>
                        <div><p class="text-[7px] text-slate-600 font-black uppercase mb-1 tracking-widest">Overs</p><p class="text-2xl font-black text-white italic leading-none">${formatOvers(m.balls)}</p></div>
                    </div>
                    <button onclick="window.resetMatchAndRemove()" class="w-full bg-emerald-500 text-white py-5 rounded-3xl font-black tracking-widest text-[10px] uppercase italic">Close Hub</button>
                </div>
            </div>`;
        }

        window.onload = initApp;
    </script>
</head>
<body class="bg-[#020617]">
    <div id="app">
        <div class="h-screen w-screen flex flex-col items-center justify-center text-white gap-8">
            <div class="w-16 h-16 border-[6px] border-emerald-600 border-t-transparent rounded-2xl animate-spin shadow-2xl"></div>
            <div class="text-center">
                <p class="text-[10px] font-black tracking-[0.8em] text-emerald-400 uppercase mb-2 animate-pulse italic">Cricket Pro</p>
                <p class="text-slate-700 font-black text-[8px] uppercase tracking-widest italic">Syncing Hub...</p>
            </div>
        </div>
    </div>
</body>
</html>
